<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hydra Dashboard</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0f2a;
  color: white;
  display: flex;
}

/* SIDEBAR */
.sidebar {
  width: 220px;
  background: #0a0f2c;
  height: 100vh;
  padding: 20px;
}

.sidebar h2 {
  text-align: center;
}

.sidebar a {
  display: block;
  padding: 10px;
  margin: 5px 0;
  cursor: pointer;
  border-radius: 8px;
}

.sidebar a:hover {
  background: #1a1f4a;
}

/* CONTEÚDO */
.content {
  flex: 1;
  padding: 20px;
}

/* CARD */
.card {
  background: #11163a;
  padding: 20px;
  border-radius: 10px;
  margin: 10px 0;
}

/* INPUT */
input, select {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
}

/* BOTÃO */
button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(90deg,#00d4ff,#a855f7);
  color: white;
  cursor: pointer;
}

/* PREVIEW */
.preview {
  border-left: 5px solid #5865F2;
}

/* LOADING */
.loading {
  display: none;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>Hydra</h2>
  <a onclick="show('home')">🏠 Início</a>
  <a onclick="show('editar')">⚙️ Editar</a>
  <a onclick="show('comandos')">📜 Comandos</a>
</div>

<div class="content">

<!-- HOME -->
<div id="home" class="page">
  <h1>Bem-vindo ao Hydra</h1>

  <div class="card">
    💡 "Controle total do seu servidor começa aqui."
  </div>

  <div class="card">
    <a href="https://discord.com/oauth2/authorize?client_id=1487580689615552552&permissions=8&scope=bot%20applications.commands" target="_blank">
      <button>Adicionar Bot</button>
    </a>
  </div>
</div>

<!-- EDITAR -->
<div id="editar" class="page" style="display:none;">
  <h1>Editar Configuração</h1>

  <div class="card">
    <input id="guild" placeholder="ID do servidor">
    <input id="emoji" placeholder="Emoji (🔥)">
    <input id="cor" type="color">
    <input id="footer" placeholder="Footer">

    <button onclick="salvar()">Salvar</button>

    <div class="loading" id="loading">⏳ Salvando...</div>
  </div>

  <div class="card preview" id="preview">
    Preview do Embed
  </div>
</div>

<!-- COMANDOS -->
<div id="comandos" class="page" style="display:none;">
  <h1>Comandos</h1>

  <div class="card">/ban</div>
  <div class="card">/kick</div>
  <div class="card">/clear</div>
</div>

</div>

<script>
function show(page){
  document.querySelectorAll(".page").forEach(p => p.style.display="none");
  document.getElementById(page).style.display="block";
}

async function salvar(){
  const guild = document.getElementById("guild").value;
  const emoji = document.getElementById("emoji").value;
  const cor = document.getElementById("cor").value;
  const footer = document.getElementById("footer").value;

  const loading = document.getElementById("loading");

  if(!guild){
    alert("Coloque o ID do servidor!");
    return;
  }

  loading.style.display = "block";

  try {
    const res = await fetch("https://hydra-api-1.onrender.com/salvar", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        guild_id: guild,
        emoji: emoji,
        cor: cor,
        footer: footer
      })
    });

    const data = await res.json();

    // PREVIEW
    const preview = document.getElementById("preview");
    preview.style.borderLeft = "5px solid " + cor;
    preview.innerHTML = `
      <b>${emoji} Painel atualizado</b><br><br>
      Footer: ${footer}
    `;

    alert("✅ Salvo com sucesso!");

  } catch(err){
    alert("Erro ao conectar API");
  }

  loading.style.display = "none";
}
</script>

</body>
</html>
