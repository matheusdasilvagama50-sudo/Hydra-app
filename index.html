<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Hydra Bot</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    display: flex;
    background-color: #121212;
    color: white;
}

/* MENU LATERAL */
.sidebar {
    width: 200px;
    background: #1f1f1f;
    padding: 20px;
    height: 100vh;
}

.sidebar button {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
    background: #2a2a3f;
    color: white;
    border: none;
    cursor: pointer;
}

/* CONTEÚDO */
.content {
    flex: 1;
    padding: 20px;
    text-align: center;
}

.banner {
    width: 100%;
    max-height: 200px;
}

.avatar {
    width: 120px;
    border-radius: 50%;
    margin-top: -60px;
}

.card {
    background: #2a2a3f;
    padding: 10px;
    margin: 10px;
    border-radius: 10px;
}
</style>

<script>
function mostrar(secao) {
    document.getElementById("inicio").style.display = "none";
    document.getElementById("comandos").style.display = "none";

    document.getElementById(secao).style.display = "block";
}
</script>

</head>
<body>

<!-- MENU -->
<div class="sidebar">
    <h2>Hydra</h2>
    <button onclick="mostrar('inicio')">Início</button>
    <button onclick="mostrar('comandos')">Comandos</button>
</div>

<!-- CONTEÚDO -->
<div class="content">

    <!-- INICIO -->
    <div id="inicio">
        <img src="img/banner.png" class="banner">
        <img src="img/avatar.png" class="avatar">
        <h1>Hydra Bot</h1>
        <p>Bot profissional para Discord ⚡</p>

        <a href="https://discord.com/oauth2/authorize?client_id=1487580689615552552&scope=bot&permissions=8">
            <button>Adicionar ao Discord</button>
        </a>
    </div>

    <!-- COMANDOS -->
    <div id="comandos" style="display:none;">
        <h1>Comandos</h1>

        <div class="card">
            <h3>/hora</h3>
            <p>Mostra a hora</p>
        </div>

        <div class="card">
            <h3>/coinflip</h3>
            <p>Cara ou coroa</p>
        </div>

        <div class="card">
            <h3>/jokenpo</h3>
            <p>Pedra papel tesoura</p>
        </div>

    </div>

</div>

</body>
</html>
